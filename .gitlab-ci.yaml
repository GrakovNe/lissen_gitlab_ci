stages:
  - fetch
  - verify
  - release

variables:
  ANDROID_SDK_ROOT: "/opt/android-sdk"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GITHUB_REPO: "GrakovNe/lissen-android"
  # The app lives on GitHub; GitLab is hosted elsewhere, so the source is
  # cloned from GitHub into a per-pipeline path on the (single) shell runner,
  # so concurrent/later pipelines don't clobber each other's checkout.
  SOURCE_DIR: "/build/app-${CI_PIPELINE_ID}"
  SYSTEM_IMAGE: "system-images;android-34;google_apis;x86_64"

# Shared Android SDK bootstrap. Jobs run as the unprivileged `gitlab-runner`
# user on a shell runner, so system-level steps need sudo. The image/cmdline
# tools live under $ANDROID_SDK_ROOT and are cached between pipelines.
.android_setup: &android_setup
  tags:
    - android
  cache:
    key: android-sdk
    paths:
      - /opt/android-sdk/
  before_script:
    - sudo apt-get update -qq && sudo apt-get install -y -qq wget unzip git
    - sudo mkdir -p "$ANDROID_SDK_ROOT" && sudo chown -R gitlab-runner:gitlab-runner "$ANDROID_SDK_ROOT"
    - mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
    - |
      if [ ! -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
        unzip -q /tmp/cmdtools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
        mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
      fi
    - export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    - yes | sdkmanager --licenses > /dev/null 2>&1 || true

# 1. Fetch the application source from GitHub.
fetch_source:
  stage: fetch
  tags:
    - android
  before_script:
    - sudo apt-get update -qq && sudo apt-get install -y -qq git
    - sudo mkdir -p /build && sudo chown -R gitlab-runner:gitlab-runner /build
  script:
    # Drop checkouts from old pipelines (best-effort housekeeping).
    - find /build -maxdepth 1 -name 'app-*' -mtime +2 -exec rm -rf {} + 2>/dev/null || true
    - rm -rf "$SOURCE_DIR"
    - git clone "https://github.com/${GITHUB_REPO}.git" "$SOURCE_DIR"
    - echo "Fetched ${GITHUB_REPO} into $SOURCE_DIR"

# 2. Build and run both the unit suite and the instrumented suite.
#    The instrumented suite runs on a headless emulator (KVM passed into the
#    LXC container from the Proxmox host).
verify:
  <<: *android_setup
  stage: verify
  needs:
    - fetch_source
  script:
    - sdkmanager "platform-tools" "emulator" "platforms;android-37.0" "build-tools;36.0.0" "$SYSTEM_IMAGE" > /dev/null
    - cd "$SOURCE_DIR"
    - chmod +x ./gradlew

    # --- Unit suite ---
    - echo "Running unit tests..."
    - ./gradlew test -Proom.schemaLocation=$SOURCE_DIR/app/schemas

    # --- Instrumented suite (headless emulator) ---
    - echo "no" | avdmanager create avd -n ci_emu -k "$SYSTEM_IMAGE" --device "pixel_6" --force
    # Redirect the emulator's output to a file; otherwise its background process
    # keeps the job's stdout pipe open and the job never finishes.
    - |
      "$ANDROID_SDK_ROOT/emulator/emulator" -avd ci_emu \
        -no-window -no-audio -no-boot-anim -no-snapshot \
        -gpu swiftshader_indirect -accel auto > /tmp/emulator.log 2>&1 &
    - adb wait-for-device
    - |
      echo "Waiting for emulator to finish booting..."
      timeout 600 sh -c 'until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do sleep 3; done'
      adb shell input keyevent 82 || true
    - adb shell settings put global window_animation_scale 0 || true
    - adb shell settings put global transition_animation_scale 0 || true
    - adb shell settings put global animator_duration_scale 0 || true
    - echo "Running instrumented tests..."
    - ./gradlew connectedDebugAndroidTest -Proom.schemaLocation=$SOURCE_DIR/app/schemas
    # Stop the emulator before the script shell exits so the job can finish.
    - adb emu kill || true
  after_script:
    - $ANDROID_SDK_ROOT/platform-tools/adb emu kill || true
    - mkdir -p "$CI_PROJECT_DIR/test-results" "$CI_PROJECT_DIR/junit"
    - cp -r $SOURCE_DIR/app/build/reports/tests "$CI_PROJECT_DIR/test-results/unit" 2>/dev/null || true
    - cp -r $SOURCE_DIR/app/build/reports/androidTests "$CI_PROJECT_DIR/test-results/instrumented" 2>/dev/null || true
    - cp -r $SOURCE_DIR/app/build/outputs/androidTest-results/connected/* "$CI_PROJECT_DIR/junit/" 2>/dev/null || true
    - find $SOURCE_DIR/app/build/test-results -name '*.xml' -exec cp {} "$CI_PROJECT_DIR/junit/" \; 2>/dev/null || true
  artifacts:
    name: "lissen-test-results-${CI_PIPELINE_ID}"
    when: always
    paths:
      - test-results/
    reports:
      junit: junit/**/*.xml
    expire_in: 14 days

# 3. Manual "Release to GitHub" button. Only becomes available once fetch +
#    verify have passed. Builds the signed release and publishes it to GitHub.
release_github:
  <<: *android_setup
  stage: release
  when: manual
  needs:
    - verify
  script:
    - sudo apt-get install -y -qq curl python3
    - sdkmanager "platform-tools" "platforms;android-37.0" "build-tools;36.0.0" > /dev/null
    - echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
    - cd "$SOURCE_DIR"
    - chmod +x ./gradlew

    - echo "Building release APK and AAB..."
    - |
      ./gradlew assembleRelease bundleRelease \
        -Proom.schemaLocation=$SOURCE_DIR/app/schemas \
        -Pandroid.injected.signing.store.file=/tmp/release.keystore \
        -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
        -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
        -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

    - echo "Reading version from build.gradle.kts..."
    - VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName = "\(.*\)".*/\1/')
    - echo "Current version -> $VERSION"

    - APK_PATH=$(find "$SOURCE_DIR" -path "*/apk/release/*.apk" ! -name "*unsigned*" | head -n 1)
    - AAB_PATH=$(find "$SOURCE_DIR" -path "*/bundle/release/*.aab" | head -n 1)
    - APK_NAME="lissen-${VERSION}.apk"
    - AAB_NAME="lissen-${VERSION}.aab"
    - cp "$APK_PATH" "$CI_PROJECT_DIR/$APK_NAME"
    - cp "$AAB_PATH" "$CI_PROJECT_DIR/$AAB_NAME"
    - echo "APK -> $APK_PATH"
    - echo "AAB -> $AAB_PATH"

    - echo "Fetching previous release tag..."
    - |
      PREV_TAG=$(curl -s \
        -H "Authorization: token $GITHUB_TOKEN" \
        https://api.github.com/repos/$GITHUB_REPO/releases/latest \
        | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name',''))")
      echo "Previous tag -> $PREV_TAG"

    - echo "Generating release notes..."
    - |
      if [ -n "$PREV_TAG" ]; then
        PREV_SHA=$(git ls-remote https://github.com/$GITHUB_REPO.git "refs/tags/$PREV_TAG" | awk '{print $1}')
        if [ -n "$PREV_SHA" ]; then
          COMMITS=$(git log --format="- %s" "${PREV_SHA}..HEAD" 2>/dev/null | head -30)
        fi
        if [ -z "$COMMITS" ]; then
          COMMITS="- No new commits"
        fi
        CHANGELOG_URL="https://github.com/${GITHUB_REPO}/compare/${PREV_TAG}...${VERSION}"
        RELEASE_NOTES="## Changes since ${PREV_TAG}\n\n${COMMITS}\n\n**Full changelog:** ${CHANGELOG_URL}"
      else
        RELEASE_NOTES="Initial release"
      fi
      echo "Release notes ready"

    - echo "Creating GitHub release $VERSION..."
    - |
      ESCAPED_NOTES=$(echo -e "$RELEASE_NOTES" | awk '{gsub(/"/, "\\\""); printf "%s\\n", $0}' | head -c 65000)
      BODY_JSON="{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\",\"body\":\"${ESCAPED_NOTES}\",\"draft\":false,\"prerelease\":false}"
      RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Content-Type: application/json" \
        https://api.github.com/repos/$GITHUB_REPO/releases \
        -d "$BODY_JSON")
      HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
      BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
      echo "$BODY"
      if [ "$HTTP_STATUS" != "201" ]; then
        echo "GitHub release creation failed with status $HTTP_STATUS"
        exit 1
      fi
      UPLOAD_URL=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].replace('{?name,label}',''))")
      echo "Release created, upload URL -> $UPLOAD_URL"

    - echo "Uploading APK to release..."
    - |
      UPLOAD_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Content-Type: application/vnd.android.package-archive" \
        -H "Accept: application/vnd.github+json" \
        --data-binary @"$APK_PATH" \
        "${UPLOAD_URL}?name=${APK_NAME}&label=${APK_NAME}")
      echo "$UPLOAD_RESPONSE"
      UPLOAD_STATUS=$(echo "$UPLOAD_RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
      if [ "$UPLOAD_STATUS" != "201" ]; then
        echo "APK upload failed with status $UPLOAD_STATUS"
        exit 1
      fi
      echo "APK uploaded successfully"

    - echo "Uploading AAB to release..."
    - |
      AAB_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Content-Type: application/octet-stream" \
        -H "Accept: application/vnd.github+json" \
        --data-binary @"$AAB_PATH" \
        "${UPLOAD_URL}?name=${AAB_NAME}&label=${AAB_NAME}")
      echo "$AAB_RESPONSE"
      AAB_STATUS=$(echo "$AAB_RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
      if [ "$AAB_STATUS" != "201" ]; then
        echo "AAB upload failed with status $AAB_STATUS"
        exit 1
      fi
      echo "AAB uploaded successfully"

    - echo "Bumping version..."
    - |
      NEW_VERSION=$(echo "$VERSION" | sed 's/\([0-9]*\.[0-9]*\.\)\([0-9]*\)\(.*\)/echo "\1$((\2+1))\3"/e')
      echo "New version -> $NEW_VERSION"
      NEW_MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
      NEW_MINOR=$(echo "$NEW_VERSION" | cut -d. -f2)
      NEW_PATCH=$(echo "$NEW_VERSION" | cut -d. -f3 | sed 's/-.*//')
      NEW_VERSION_CODE=$(( NEW_MAJOR * 10000 + NEW_MINOR * 100 + NEW_PATCH ))
      echo "New versionCode -> $NEW_VERSION_CODE"
    - |
      git config user.email "gitlab-ci@local"
      git config user.name "GitLab CI"
      sed -i "s/versionName = \"$VERSION\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
      OLD_VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/.*versionCode = \([0-9]*\).*/\1/')
      sed -i "s/versionCode = $OLD_VERSION_CODE/versionCode = $NEW_VERSION_CODE/" app/build.gradle.kts
      git add app/build.gradle.kts
      git commit -m "chore: bump version $VERSION -> $NEW_VERSION (code $OLD_VERSION_CODE -> $NEW_VERSION_CODE)"
      git push https://GrakovNe:${GITHUB_TOKEN}@github.com/$GITHUB_REPO.git HEAD:main
      echo "Version bumped to $NEW_VERSION ($NEW_VERSION_CODE) and pushed"

    - echo "All done! Release -> https://github.com/$GITHUB_REPO/releases/tag/$VERSION"
  after_script:
    - rm -f /tmp/release.keystore
  artifacts:
    name: "lissen-release-${CI_PIPELINE_ID}"
    paths:
      - "*.apk"
      - "*.aab"
    expire_in: 30 days
